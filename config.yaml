project:
  name: "skygrid-auto-editor"
  version: "0.3.0"

# ---------------------------------------------------------------------------
# Music-driven edit parameters (v0.3.0).
# When `audio.music_track` is set and `edit.beat_aligned` is true, the
# pipeline uses the beat-aware sequencer instead of plain concatenation.
# ---------------------------------------------------------------------------
edit:
  target_length: 0          # 0 = use pipeline.max_duration
  pacing: medium            # slow | medium | fast | cinematic | energetic
  mood: neutral             # luxury | energetic | moody | bright | dramatic | neutral
  property_type: generic    # real_estate | event | commercial | landscape | generic
  beat_aligned: true        # snap cuts to beats when music_track is set
  hero_clips: []            # filenames that must appear in the edit
  must_include: []          # segment descriptors to force in

paths:
  input: "./input"
  output: "./output"
  plugins: "./plugins"

pipeline:
  max_duration: 120          # Maximum output duration in seconds
  min_clip_score: 30         # Minimum composite score to include a clip (0–100)
  sort_by: "score"           # How to order clips: "score", "chronological", "random"
  enabled_analyzers:
    - "shake_detector"
    - "scene_detector"
    - "audio_analyzer"
    - "quality_windows"
    - "shot_classifier"

transitions:
  style: "crossfade"         # Options: "cut", "crossfade", "fade_black"
  duration: 0.5              # Transition duration in seconds

audio:
  music_track: null           # Path to background music file (null = no music)
  sync_to_beat: false         # Align cuts to musical beats
  original_audio_volume: 0.7  # Volume of original clip audio (0.0–1.0)
  music_volume: 0.3           # Volume of background music (0.0–1.0)

# ---------------------------------------------------------------------------
# Source profiles — describe capture devices and their known characteristics.
# Built-in profiles: dji_mini3pro, dji_mini4pro, dji_air3, dji_mavic3,
#   osmo_pocket3, osmo_action5, gopro_hero12, generic
# You can override or add new ones here.
# ---------------------------------------------------------------------------
source_profiles:
  dji_mini3pro:
    device_type: drone
    default_orientation: horizontal
    has_gimbal: true
    typical_artifacts: [prop_shadow, jello]
  osmo_pocket3:
    device_type: gimbal
    default_orientation: mixed
    has_gimbal: true
    typical_artifacts: []

# ---------------------------------------------------------------------------
# Output profiles — target platform formats.
# Built-in profiles: youtube, youtube_4k, reels, tiktok, instagram_square, twitter
# You can override or add new ones here.
# ---------------------------------------------------------------------------
output_profiles:
  youtube:
    aspect_ratio: [16, 9]
    resolution: [1920, 1080]
    fps: 30
    codec: libx264
    bitrate: 20M
    platform_tags: [youtube, web]
    aspect_ratio_mode: blur_bars
  reels:
    aspect_ratio: [9, 16]
    resolution: [1080, 1920]
    fps: 30
    codec: libx264
    bitrate: 15M
    platform_tags: [instagram, reels, mobile]
    aspect_ratio_mode: blur_bars
  tiktok:
    aspect_ratio: [9, 16]
    resolution: [1080, 1920]
    fps: 30
    codec: libx264
    bitrate: 15M
    platform_tags: [tiktok, mobile]
    aspect_ratio_mode: blur_bars
  instagram_square:
    aspect_ratio: [1, 1]
    resolution: [1080, 1080]
    fps: 30
    codec: libx264
    bitrate: 12M
    platform_tags: [instagram, square]
    aspect_ratio_mode: blur_bars

# Which profile to use by default (overridden by --profile on the CLI).
default_output_profile: youtube

# How to handle clips whose aspect ratio doesn't match the output profile.
# Options: "crop" (centre-crop to fill), "blur_bars" (blurred background fill),
#          "letterbox" (black bars).
aspect_ratio_mode: blur_bars
